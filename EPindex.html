<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .correct { color: #059669; font-weight: bold; }
        .incorrect { color: #dc2626; font-weight: bold; }
        .choice-label { cursor: pointer; transition: all 0.2s; }
        .choice-label:hover { background-color: #f9fafb; }
    </style>

<body class="py-10 px-4">

                <div>
                    <label class="block text-sm font-medium text-gray-700">แผนก</label>

                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">รหัสพนักงาน</label>

                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">วันที่</label>
                    <input type="date" id="test-date" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 outline-none focus:ring-2 focus:ring-red-500">
                </div>
            </div>
            <button onclick="startQuiz()" class="mt-8 w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">เริ่มทำข้อสอบ</button>
        </div>

        <!-- Quiz Section -->
        <div id="quiz-container" class="hidden p-8">
            <div id="questions-list" class="space-y-10">

            </div>
            <div class="mt-12 text-center">

        </div>

        <div id="result-container" class="hidden p-8 text-center">
            <h2 class="text-3xl font-bold text-gray-800">ผลการทดสอบ</h2>
            <div class="mt-6 p-6 bg-gray-50 rounded-xl inline-block">

                <p class="text-4xl font-bold mt-4">คะแนนที่ได้: <span id="score-display">0</span> / 50</p>
            </div>
            <div id="feedback-list" class="mt-10 text-left space-y-6">
                <!-- Feedback results will be shown here -->
            </div>
            <button onclick="location.reload()" class="mt-10 bg-gray-600 text-white py-2 px-6 rounded-lg hover:bg-gray-700">ทำแบบทดสอบอีกครั้ง</button>
        </div>
    </div>

            { q: "เลือดในเกาเหลาโฟได้มาจาก", a: ["หมู", "ปลา", "เป็ด", "ไก่"], c: 2, r: "เป็ด" },

            { q: "ก้านอ่อนกรอบ ผัดซอสสูตรโรงเบียร์ คือเมนูใด", a: ["กะหล่ำปลีทอดน้ำปลา", "ไหลบัวผัดเตาเจี้ยว", "ผักบุ้งไฟแดง", "ผักบุ้งซอยตะวันแดง"], c: 3, r: "ผักบุ้งซอยตะวันแดง" },

        function startQuiz() {
            const name = document.getElementById('user-name').value;
            if (!name) {
                alert("กรุณากรอกชื่อ-นามสกุลก่อนเริ่ม");
                return;
            }
            document.getElementById('info-form').classList.add('hidden');
            document.getElementById('quiz-container').classList.remove('hidden');
            renderQuestions();
            window.scrollTo(0,0);
        }

        function renderQuestions() {
            const list = document.getElementById('questions-list');
            list.innerHTML = questions.map((item, index) => `
                <div class="bg-gray-50 p-6 rounded-xl border-l-4 border-red-600">
                    <p class="text-lg font-bold mb-4">${index + 1}. ${item.q}</p>
                    <div class="space-y-2">
                        ${item.a.map((choice, i) => `
                            <label class="choice-label flex items-center p-3 border rounded-lg bg-white">
                                <input type="radio" name="q${index}" value="${i}" class="w-4 h-4 text-red-600">
                                <span class="ml-3 text-gray-700">${String.fromCharCode(65 + i)}: ${choice}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function submitQuiz() {
            let score = 0;
            const feedbackHtml = [];
            
            for (let i = 0; i < questions.length; i++) {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                const userAnswer = selected ? parseInt(selected.value) : -1;
                const isCorrect = userAnswer === questions[i].c;

                if (isCorrect) score++;

                feedbackHtml.push(`
                    <div class="p-4 border-b">
                        <p class="font-bold">${i + 1}. ${questions[i].q}</p>
                        <p class="${isCorrect ? 'correct' : 'incorrect'}">
                            ของคุณ: ${userAnswer === -1 ? 'ไม่ได้ตอบ' : questions[i].a[userAnswer]} 
                            ${isCorrect ? '(ถูกต้อง)' : '(ผิด)'}
                        </p>
                        ${!isCorrect ? `<p class="text-gray-600 italic">เฉลย: ${questions[i].a[questions[i].c]} (${questions[i].r})</p>` : ''}
                    </div>
                `);
            }

            document.getElementById('res-name').innerText = document.getElementById('user-name').value;
            document.getElementById('score-display').innerText = score;
            document.getElementById('feedback-list').innerHTML = feedbackHtml.join('');
            
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
